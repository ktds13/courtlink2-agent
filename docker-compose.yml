services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: courtlink2_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: courtlink
      POSTGRES_PASSWORD: courtlink
      POSTGRES_DB: courtlink2_agent
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courtlink -d courtlink2_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
